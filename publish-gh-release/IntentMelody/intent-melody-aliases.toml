# Command Melody (c:) — каталог корней ADR 0109: [[melody_root]] + опционально [[tail_wire_class]].
# Оверлей: IntentMelody/intent-melody-aliases.toml рядом с exe (как Hotkeys/hotkeys.toml).
# Норматив: docs/intent-melody-language-v1.md, ADR 0060 (аккорд), ADR 0109.

melody_catalog_schema_version = 1

# ------------------------------------------------------------------------------
# Провода хвоста (tail wire): как резать остаток после slug.
# ------------------------------------------------------------------------------

[[tail_wire_class]]
id = "url_remainder"
kind = "single_remainder"

[[tail_wire_class]]
id = "int_chain_colon_space"
kind = "delimited_slots"
# Разделители между слотами: ":" или ";" (в аккорде без TextBox «;» без Shift надёжнее) или пробел.
between_slots_any_of = [":", ";", " "]

# ------------------------------------------------------------------------------
# Parametric — хвост после slug (URL, диапазоны строк, …).
# ------------------------------------------------------------------------------

[[melody_root]]
# c:wai[:url] — веб-портал AI
slug = "wai"
command_id = "show_web_ai_portal_page"
shape = "parametric"
palette_hint_slug = "wai-url"
palette_usage_hint = "c:wai:<адрес> - веб-портал AI; адрес можно без схемы (или c:wai: для страницы по умолчанию)"
palette_usage_category = "Web AI Portal"
show_usage_hint_if_bare_slug = false
tail_signature = "<url:url>"
wire_class = "url_remainder"
chord_commit = "enter"

[[melody_root]]
# c:els:<start>:<end> — выделить строки
slug = "els"
command_id = "select"
shape = "parametric"
palette_usage_hint = "c:els:<start>:<end> или одна строка c:els:<line> (в аккорде c:els;<start>;<end> / c:els;<line> — «;» без Shift) — выделить строки"
palette_usage_category = "Editor -> Line -> Select"
tail_signature = "<start:ln>:<end:ln>"
wire_class = "int_chain_colon_space"
chord_commit = "enter"

[[melody_root]]
# c:eld:<start>:<end> — удалить строки
slug = "eld"
command_id = "apply_edit"
shape = "parametric"
palette_usage_hint = "c:eld:<start>:<end> или одна строка c:eld:<line> (в аккорде c:eld;<start>;<end> / c:eld;<line> — «;» без Shift) — удалить строки"
palette_usage_category = "Editor -> Line -> Delete"
tail_signature = "<start:ln>:<end:ln>"
wire_class = "int_chain_colon_space"
chord_commit = "enter"

