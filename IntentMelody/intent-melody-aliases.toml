# Command Melody (c:) — хвост после c: → command_id (канон из IdeCommands / MCP).
# Оверлей: файл рядом с exe — IntentMelody/intent-melody-aliases.toml (как Hotkeys/hotkeys.toml).
# Норматив: docs/intent-melody-language-v1.md, ADR 0060 §11.

[aliases]
# Editor -> Line (ADR 0081; параметрический хвост в палитре c:)
els = "select"
eld = "apply_edit"
# Git
gs = "git_status"
gc = "git_commit"
gp = "git_push"
gsu = "git_submodule"
# Build / test
br = "build_solution_ui"
bs = "build_structured"
bt = "run_tests"
# Debug
da = "debug_attach"
dl = "debug_launch"
dc = "debug_continue"
dn = "debug_step_over"
di = "debug_step_into"
df = "debug_step_out"
dx = "debug_stop"
# Workspace
so = "open_solution_dialog"
# Task cockpit: Take Off / Landing (сплиттеры)
tol = "toggle_workspace_splitters_lock"
# Chat (домен c…)
cps = "show_chat_page"
cs = "send_chat"
cex = "chat_export_readable"
ctf = "fork_chat_thread"
# Agent navigation in chat surface (домен a…)
amp = "chat_select_prev_message"
amn = "chat_select_next_message"
amt = "chat_toggle_selected_thinking"
amh = "chat_toggle_show_thinking_in_history"
atp = "chat_select_prev_thread"
atn = "chat_select_next_thread"
ato = "chat_open_selected_thread"
atb = "chat_show_thread_overview"
# Environment readiness (домен e…)
ers = "show_environment_readiness_page"
# Hybrid Codebase Index (домен h…)
his = "show_hybrid_index_page"
# Terminal (домен t…)
ts = "show_terminal_panel"
