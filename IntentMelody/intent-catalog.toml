help = "Отменить активный verify run."
group = "Agent"
kind = "agent"
arg_tail = "none"

[[command.slash]]
path = "/agent status"
help = "Статус AEE: активный verify, snapshot_id."
group = "Agent"
kind = "agent"
arg_tail = "none"

[[command.slash]]
path = "/agent last"
help = "Time accounting последнего verify run."
group = "Agent"
kind = "agent"
arg_tail = "none"

[[command.slash]]
path = "/agent sandbox"
help = "Подготовить sandbox substrate. Хвост: agent_ephemeral | agent_worktree | in_place."
group = "Agent"
kind = "agent"
arg_tail = "optional"

# ==============================================================================
# Cockpit (ADR 0138)
# ==============================================================================

# cockpit.open_command_line — Cockpit Command Line (slash REPL над composer). (c:ccl · Ctrl+K /)
[[command]]
command_id = "cockpit.open_command_line"
melody_slug = "ccl"
melody_shape = "simple"
melody_palette_usage_hint = "c:ccl или Ctrl+K затем / — полоса slash REPL (Enter — выполнить, Esc — закрыть)"
melody_palette_usage_category = "Cockpit"

[[command.slash]]
path = "/cockpit command line"
domain = "cockpit"
object = "command"
intent = "line"
help = "Открыть Cockpit Command Line над composer (не путать с composer и не с MFD Terminal)."
group = "Cockpit"

# ==============================================================================
# Help
# ==============================================================================

# local — Справка Intercom (локально, не в общий канал). (/help)
[[command]]

[[command.slash]]
path = "/help"
domain = "help"
help = "Справка Intercom: темы, [вложения], слэши; /help <namespace> — только команды."
group = "Справка"
kind = "help"
audience = "self"
arg_tail = "optional"