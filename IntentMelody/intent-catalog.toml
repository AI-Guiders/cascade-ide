# intent-catalog.toml — command-first каталог форм ввода (ADR 0109, 0119)
# Оверлей: IntentMelody/intent-catalog.toml рядом с exe (legacy: intent-melody-aliases.toml).
#
# Cookbook:
# - Якорь: command_id (канон IdeCommands / MCP).
# - Melody: поля melody_* на [[command]] (0–1 slug на команду); в палитре c:<slug>.
# - Slash: [[command.form.slash]] (0..N); intent-first пути /namespace action.
# - slash_group на [[command]] — группа autocomplete по умолчанию для всех slash ниже.
# - [command.form.slash.args] — статические args (page, surface); legacy mfd_page тоже читается.
# - enabled = false — отключить команду или отдельный slash без удаления из файла.
# - IML v2 (параметрические мелодии, tail_wire_class) — смысл языка, ADR 0109; не путать с intent_catalog_schema_version.
# - Параметрический slash: любая команда с melody_shape=parametric — хвост по wire_class (ADR 0124).
#   Редактор: /editor line select|delete <строки>. Портал: /portal open [url] (как c:wai).
# - Норматив: docs/intent-melody-language-v1.md
#
intent_catalog_schema_version = 1

# ------------------------------------------------------------------------------
# [[tail_wire_class]] — провода хвоста parametric melody (c:)
# ------------------------------------------------------------------------------

[[tail_wire_class]]
id = "url_remainder"
kind = "single_remainder"

[[tail_wire_class]]
id = "int_chain_colon_space"
kind = "delimited_slots"
between_slots_any_of = [":", ";", " "]

[[tail_wire_class]]
id = "bracket_code_ref"
kind = "single_remainder"

# ==============================================================================
# Editor (parametric line)
# ==============================================================================

# apply_edit — Удалить строки в открытом файле (1-based): одна, «5 10» или … (/editor line delete)
[[command]]
command_id = "apply_edit"
melody_slug = "eld"
melody_shape = "parametric"
melody_tail_signature = "<start:ln>:<end:ln>"
melody_wire_class = "int_chain_colon_space"
melody_chord_commit = "enter"
melody_palette_usage_hint = "c:eld:<start>:<end> или одна строка c:eld:<line> (в аккорде c:eld;<start>;<end> / c:eld;<line> — «;» без Shift) — удалить строки"
melody_palette_usage_category = "Editor -> Line -> Delete"

[[command.form.slash]]
path = "/editor line delete"
help = "Удалить строки в открытом файле (1-based): одна, «5 10» или «5:10»."
group = "Editor"

# select — Выделить строки в открытом файле (1-based): одна, «5 10» или… (/editor line select)
[[command]]
command_id = "select"
melody_slug = "els"
melody_shape = "parametric"
melody_tail_signature = "<start:ln>:<end:ln>"
melody_wire_class = "int_chain_colon_space"
melody_chord_commit = "enter"
melody_palette_usage_hint = "c:els:<start>:<end> или одна строка c:els:<line> (в аккорде c:els;<start>;<end> / c:els;<line> — «;» без Shift) — выделить строки"
melody_palette_usage_category = "Editor -> Line -> Select"

[[command.form.slash]]
path = "/editor line select"
help = "Выделить строки в открытом файле (1-based): одна, «5 10» или «5:10»."
group = "Editor"

# editor.select_code — Select по bracket [M:…] (ADR 0131)
[[command]]
command_id = "editor.select_code"
melody_slug = "esc"
melody_shape = "parametric"
melody_tail_signature = "<code_ref:bracket>"
melody_wire_class = "bracket_code_ref"
melody_chord_commit = "enter"
melody_palette_usage_hint = "c:esc:[M:Method] — выделить фрагмент по bracket-ссылке"
melody_palette_usage_category = "Editor -> Code"

[[command.form.slash]]
path = "/editor select code"
help = "Выделить фрагмент по bracket: [M:…], [file.cs M:…] или [F:…; M:…; L:…]."
group = "Editor"

# editor.reveal_code — Reveal по bracket (ADR 0131, 0130)
[[command]]
command_id = "editor.reveal_code"
melody_slug = "erc"
melody_shape = "parametric"
melody_tail_signature = "<code_ref:bracket>"
melody_wire_class = "bracket_code_ref"
melody_chord_commit = "enter"
melody_palette_usage_hint = "c:erc:[M:Method] — показать фрагмент (transient highlight)"
melody_palette_usage_category = "Editor -> Code"

[[command.form.slash]]
path = "/editor reveal code"
help = "Показать фрагмент по bracket без изменения selection."
group = "Editor"

# attach_selection — прикрепить выделение в редакторе (ADR 0128)
[[command]]

[[command.form.slash]]
path = "/intercom attach selection"
help = "Прикрепить текущее выделение в редакторе к черновику сообщения."
group = "Intercom"
kind = "intercom"
intercom_handler = "attach_selection"

# attach_scope — syntax scope @ caret (ADR 0128 H0b)
[[command]]

[[command.form.slash]]
path = "/intercom attach scope"
