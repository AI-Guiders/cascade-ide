# intent-catalog.toml — command-first каталог форм ввода (ADR 0109, 0119)
# Оверлей: IntentMelody/intent-catalog.toml рядом с exe (legacy: intent-melody-aliases.toml).
#
# Cookbook:
# - Якорь: command_id (канон IdeCommands / MCP).
# - Melody: поля melody_* на [[command]] (0–1 slug на команду); в палитре c:<slug>.
# - Slash: [[command.slash]] (0..N); intent-first пути /namespace action.
# - slash_group на [[command]] — группа autocomplete по умолчанию для всех slash ниже.
# - [command.form.slash.args] — статические args (page, surface); legacy mfd_page тоже читается.
# - enabled = false — отключить команду или отдельный slash без удаления из файла.
# - auto_run_on_commit / auto_run_requires_args — после Tab выполнить без второго Enter (по умолчанию false / true).
# - arg_tail = none|optional|required — режим хвоста после полного пути (ADR 0150; обязательно для новых slash).
# - domain / object / intent / path_role — семантика пути (ADR 0154); path_role=alias при elision (/build run).
# - requires_arg_tail — устарело; не использовать (loader маппит только для старых оверлеев).
# - IML v2 (параметрические мелодии, tail_wire_class) — смысл языка, ADR 0109; не путать с intent_catalog_schema_version.
# - Параметрический slash: любая команда с melody_shape=parametric — хвост по wire_class (ADR 0124).
#   Редактор: /editor line select|delete <строки>. Портал: /portal open [url] (как c:wai).
# - Норматив: docs/intent-melody-language-v1.md
#
intent_catalog_schema_version = 2

# ==============================================================================
# Doc correspondence (ADR 0061, 0155)
# ==============================================================================

[[command]]
command_id = "open_workspace_adr_correspondence"

[[command.slash]]
path = "/docs adr open"
domain = "docs"
object = "adr"
intent = "open"
help = "Открыть correspondence ADR для текущего файла (как клик по строке ADR на PFD)."
group = "Docs"
arg_tail = "none"

[[command]]
command_id = "open_workspace_feature_docs"

[[command.slash]]
path = "/docs feature open"
domain = "docs"
object = "feature"
intent = "open"
help = "Открыть docs фичи для текущего файла (как клик по строке Feature на PFD)."
group = "Docs"
arg_tail = "none"

[[command]]
command_id = "open_docs_template"

[[command.slash]]
path = "/docs template open"
domain = "docs"
object = "template"
intent = "open"
help = "Открыть шаблон документации из docs/templates (picker) в Markdown Preview."
group = "Docs"
arg_tail = "none"

# ------------------------------------------------------------------------------
# [[tail_wire_class]] — провода хвоста parametric melody (c:)
# ------------------------------------------------------------------------------

[[tail_wire_class]]
id = "url_remainder"
kind = "single_remainder"

[[tail_wire_class]]
id = "int_chain_colon_space"
kind = "delimited_slots"
between_slots_any_of = [":", ";", " "]

[[tail_wire_class]]
id = "bracket_code_ref"
kind = "single_remainder"

