command_id = "show_environment_readiness_page"
melody_slug = "ers"
melody_shape = "simple"

[[command.form.slash]]
path = "/readiness show"
help = "Страница готовности окружения (Environment Readiness)."
group = "Панели"

# show_hybrid_index_page — Hybrid codebase index. (/index show)
[[command]]
command_id = "show_hybrid_index_page"
melody_slug = "his"
melody_shape = "simple"

[[command.form.slash]]
path = "/index show"
help = "Hybrid codebase index."
group = "Панели"

# show_terminal_panel — c:ts (c:ts)
[[command]]
command_id = "show_terminal_panel"
melody_slug = "ts"
melody_shape = "simple"

# show_web_ai_portal_page — Открыть Web AI Portal; опционально URL (как c:wai:…). Без UR… (/portal open)
[[command]]
command_id = "show_web_ai_portal_page"
melody_slug = "wai"
melody_shape = "parametric"
melody_show_usage_hint_if_bare_slug = false
melody_tail_signature = "<url:url>"
melody_wire_class = "url_remainder"
melody_chord_commit = "enter"
melody_palette_hint_slug = "wai-url"
melody_palette_usage_hint = "c:wai:<адрес> - веб-портал AI; адрес можно без схемы (или c:wai: для страницы по умолчанию)"
melody_palette_usage_category = "Web AI Portal"

[[command.form.slash]]
path = "/portal open"
help = "Открыть Web AI Portal; опционально URL (как c:wai:…). Без URL — страница по умолчанию."
group = "Web AI Portal"

# ==============================================================================
# Intercom inspect (local report)
# ==============================================================================

[[command]]
[[command.form.slash]]
path = "/intercom topic list"
help = "Интерактивный список тем в ленте (клик — открыть). Текст для агента: /topic list text."
group = "Intercom"
kind = "intercom"
intercom_handler = "topic_list"

[[command]]
[[command.form.slash]]
path = "/intercom topic list text"
help = "Текстовый список тем (для агента): main, active, число сообщений."
group = "Intercom"
kind = "report"
report_handler = "topic_list_text"

[[command]]
[[command.form.slash]]
path = "/intercom topic tree"
help = "Интерактивное дерево тем в ленте (клик — открыть). Текст: /topic tree text."
group = "Intercom"
kind = "intercom"
intercom_handler = "topic_tree"

[[command]]
[[command.form.slash]]
path = "/intercom topic tree text"
help = "Текстовое дерево веток (fork) с числом сообщений."
group = "Intercom"
kind = "report"
report_handler = "topic_tree_text"

[[command]]
[[command.form.slash]]
path = "/intercom topic create"
help = "Новая тема с заголовком: /topic create <название>."
group = "Intercom"
kind = "intercom"
intercom_handler = "topic_create"

[[command]]
[[command.form.slash]]
path = "/intercom topic rename"
help = "Переименовать текущую тему: /topic rename <название>."
group = "Intercom"
kind = "intercom"
intercom_handler = "topic_rename"

[[command]]
[[command.form.slash]]
path = "/intercom spine list"
help = "Product spine: линия, фокус, вехи (список)."
group = "Intercom"
kind = "report"
report_handler = "spine_list"

[[command]]
[[command.form.slash]]
path = "/intercom spine tree"
help = "Product spine: линия → фокус → вехи (дерево)."
group = "Intercom"
kind = "report"
report_handler = "spine_tree"

[[command]]
[[command.form.slash]]
path = "/intercom topic cards"
help = "Картотека тем (overview): карточки тем и spine; drill-in — /topic open."
group = "Intercom"
kind = "intercom"
intercom_handler = "topic_cards"

[[command]]
[[command.form.slash]]
path = "/intercom topic open"
help = "Открыть тему (detail): подсказки «id · заголовок»; аргумент — короткий id, заголовок или пусто — выбранная/активная."
group = "Intercom"
kind = "intercom"
intercom_handler = "topic_open"
completion = "session_topics"

[[command]]
[[command.form.slash]]
path = "/intercom spine open"
help = "Картотека (overview); то же, что /intercom topic cards."
group = "Intercom"
kind = "intercom"
intercom_handler = "spine_open"

[[command]]
[[command.form.slash]]
path = "/intercom message select"
help = "Выбрать сообщение по gutter (1-based): n, «n m» или «n:m» (как /editor line select); активно — конец диапазона."
group = "Intercom"
kind = "intercom"
intercom_handler = "message_select"

[[command]]
[[command.form.slash]]
path = "/intercom message find"
help = "Сообщения ветки по коду (inferred из attach): selection, L:10-20, [M:…]."
group = "Intercom"
kind = "intercom"
intercom_handler = "message_find"

[[command]]
[[command.form.slash]]
path = "/intercom message relate"
help = "Связать диапазон gutter (#n или n:m) с кодом: «3:5 relate selection»; в лог — AttachmentAnchor, не голые строки."
group = "Intercom"
kind = "intercom"
intercom_handler = "message_relate"

[[command]]
[[command.form.slash]]
path = "/intercom message anchors list"
help = "Якоря выбранного сообщения и черновика composer: a:id, статус resolve, путь. Без hit-test — затем /anchor peek <id>."
group = "Intercom"
kind = "intercom"
intercom_handler = "message_anchors_list"

[[command]]
[[command.form.slash]]
path = "/anchor peek"
help = "Reveal вложения по short id (8 hex из ⟦a:…⟧ или list). Пример: /anchor peek abcd1234"
group = "Intercom"
kind = "intercom"
intercom_handler = "anchor_peek"

