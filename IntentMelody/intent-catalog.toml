# ==============================================================================

# apply_edit — Удалить строки в открытом файле (1-based): одна, «5 10» или … (/editor line delete)
[[command]]
command_id = "apply_edit"
melody_slug = "eld"
melody_shape = "parametric"
melody_tail_signature = "<start:ln>:<end:ln>"
melody_wire_class = "int_chain_colon_space"
melody_chord_commit = "enter"
melody_palette_usage_hint = "c:eld:<start>:<end> или одна строка c:eld:<line> (в аккорде c:eld;<start>;<end> / c:eld;<line> — «;» без Shift) — удалить строки"
melody_palette_usage_category = "Editor -> Line -> Delete"

[[command.slash]]
path = "/editor line delete"
domain = "editor"
object = "line"
intent = "delete"
help = "Удалить строки в открытом файле (1-based): одна, «5 10» или «5:10»."
group = "Editor"
arg_tail = "required"

# select — Выделить строки в открытом файле (1-based): одна, «5 10» или… (/editor line select)
