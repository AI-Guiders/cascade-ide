# Cascade IDE documentation site (GitHub Pages: /cascade-ide/)
# Build: pip install -r requirements-docs.txt && python tools/gen_adr_pages.py && mkdocs build

site_name: Cascade IDE
site_description: Agent-first IDE for .NET — documentation, ADR, architecture
site_url: https://ai-guiders.github.io/cascade-ide/
repo_url: https://github.com/AI-Guiders/cascade-ide
repo_name: AI-Guiders/cascade-ide
edit_uri: edit/develop/docs/

docs_dir: docs
site_dir: site

hooks:
  - hooks/i18n_alternate_absolute.py

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - redirects:
      redirect_maps:
        # Broken relative links from docs/site/adr-nav/ (../adr → /site/adr/ on Pages)
        site/adr/README.md: adr/README.md
        site/adr/status-lifecycle.md: adr/status-lifecycle.md
        # docs/ux/ matched ISO 639-1 locale "ux" in mkdocs-static-i18n — use ui-ux/
        ux/cascade-ide-ui-layout-v1.md: ui-ux/cascade-ide-ui-layout-v1.md
        ux/concept-to-implementation-map-v1.md: ui-ux/concept-to-implementation-map-v1.md
        ux/README.md: ui-ux/README.md
  - search:
      lang:
        - ru
        - en
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      languages:
        - locale: ru
          name: Русский
          default: true
          build: true
          site_name: Cascade IDE
          nav:
            - Главная: index.md
            - IOP (манифест): iop-manifest-v1.md
            - ADR:
                - site/adr-nav/index.md
                - По статусам:
                    - Proposed: site/adr-nav/proposed.md
                    - Accepted: site/adr-nav/accepted.md
                    - In progress: site/adr-nav/accepted-in-progress.md
                    - Implemented: site/adr-nav/accepted-implemented.md
                    - Superseded: site/adr-nav/superseded.md
                    - Прочее: site/adr-nav/other.md
                - Жизненный цикл: adr/status-lifecycle.md
                - Полный индекс: adr/README.md
            - Архитектура:
                - Политика: architecture-policy.md
                - Текущая архитектура: architecture/current-architecture-v1.md
                - MCP: MCP-PROTOCOL.md
            - UX:
                - Раскладка UI: ui-ux/cascade-ide-ui-layout-v1.md
                - Карта концептов: ui-ux/concept-to-implementation-map-v1.md
            - Дизайн:
                - Design Handbook: design/cide-design-handbook-v1.md
                - Философия продукта: design/cascadeide-philosophy-v1.md
                - Токены chrome: design/ide-chrome-tokens-v1.md
                - Intercom (design hub): design/intercom-design-hub-v1.md
                - Intercom (референсы): design/intercom-ux-reference-slack-mattermost-v1.md
                - "ADR 0128: attach / code references": adr/0128-intercom-attachment-anchors-and-code-references.md
                - "ADR 0129: message body markdown / fenced": adr/0129-intercom-message-body-markdown-and-fenced-code.md
                - Зоны внимания (playbook): design/attention-zone-panel-playbook-v1.md
                - Skia vs overlay: design/skia-surfaces-vs-overlays-v1.md
        - locale: en
          name: English
          build: true
          site_name: Cascade IDE
          nav:
            - Home: index.md
            - IOP manifest: iop-manifest-v1.md
            - Concept overview: concept-overview.md
            - ADR:
                - site/adr-nav/index.md
                - By status:
                    - Proposed: site/adr-nav/proposed.md
                    - Accepted: site/adr-nav/accepted.md
                    - In progress: site/adr-nav/accepted-in-progress.md
                    - Implemented: site/adr-nav/accepted-implemented.md
                    - Superseded: site/adr-nav/superseded.md
                    - Other: site/adr-nav/other.md
                - Lifecycle: adr/status-lifecycle.md
                - Full index: adr/README.md
                - Russian ADR (canonical): https://ai-guiders.github.io/cascade-ide/adr/
            - Architecture:
                - Policy: architecture-policy.md
                - Current architecture: architecture/current-architecture-v1.md
                - MCP: MCP-PROTOCOL.md
            - UX:
                - UI layout: ui-ux/cascade-ide-ui-layout-v1.md
                - Concept map: ui-ux/concept-to-implementation-map-v1.md
                - UX index: ui-ux/README.md
            - Design:
                - Design Handbook (RU): design/cide-design-handbook-v1.md
                - Concept overview: concept-overview.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

# Language switcher: mkdocs-static-i18n `reconfigure_material: true` sets contextual
# alternates per page (do not add manual extra.alternate — breaks GitHub Pages subpath).

exclude_docs: |
  architecture-migration.md
  design/workspace-health-implementation-map-v1.md
  design/ide-command-registry-v1.md
  design/editor-hud-inline-migration-inventory-v1.md
  design/editor-surface-candidates-comparison-v1.md
  design/editor-hud-banner-inline-policy-v1.md
  design/analyzer-rollout-dal-ccu-v1.md
  design/data-acquisition-layer-boundaries-v1.md
  design/cds-contract-v0.md
  design/workspace-navigation-mcp-cookbook.md
  design/vertical-slice-attention-capabilities-v1.md
  adr/snippets/*

validation:
  absolute_links: ignore
  unrecognized_links: ignore
  anchors: ignore
