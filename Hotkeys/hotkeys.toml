# command_id -> строка жеста (KeyGesture.Parse). Оверлей: %LocalAppData%\CascadeIDE\hotkeys.toml
# Источник правды для подсказок палитры, меню и tunnel (фокус в редакторе).
#
# Глобальные привязки сведены к минимуму: команды — через Command Melody (c: в палитре Ctrl+Q) и
# CascadeChord (корень ниже). Доп. жесты можно вернуть в пользовательском overlay.

toggle_command_palette = "Ctrl+Q"

# ADR 0060: корень аккорда (вторая клавиша — без Ctrl/Alt), затем тот же хвост мелодии, что после c:
cascade_chord = "Ctrl+K"
