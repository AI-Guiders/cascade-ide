# command_id -> строка жеста (KeyGesture.Parse). Оверлей: %LocalAppData%\CascadeIDE\hotkeys.toml
# Источник правды для подсказок палитры, Window.KeyBindings, меню и tunnel (фокус в редакторе).

toggle_command_palette = "Ctrl+Q"
open_solution_dialog = "Ctrl+Shift+O"
open_file_dialog = "Ctrl+O"
cycle_ui_mode = "Ctrl+Alt+M"
build_solution_ui = "Ctrl+Shift+B"

# Режим UI по индексу в каталоге (0 = первый в меню «Режим»).
set_ui_mode_by_index_0 = "Alt+1"
set_ui_mode_by_index_1 = "Alt+2"
set_ui_mode_by_index_2 = "Alt+3"
set_ui_mode_by_index_3 = "Alt+4"
set_ui_mode_by_index_4 = "Alt+5"
set_ui_mode_by_index_5 = "Alt+6"
set_ui_mode_by_index_6 = "Alt+7"
set_ui_mode_by_index_7 = "Alt+8"
set_ui_mode_by_index_8 = "Alt+9"

# Отладка: id debug_* совпадают с IdeCommands, кроме старт/продолжить (только UI).
debug_start_or_continue = "F5"
debug_stop = "Shift+F5"
debug_step_over = "F10"
debug_step_into = "F11"
debug_step_out = "Shift+F11"
