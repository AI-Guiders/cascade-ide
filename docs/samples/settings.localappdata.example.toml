# CascadeIDE — пользовательский settings.toml (вложенные секции, ADR 0028). format: nested-v2
# Источник для копирования на диск: см. также docs/samples/settings.toml

[ai]
mode = "mcp_only"

[ai.local]
backend = "ollama"

[ai.local.ollama]
model = "qwen2.5-coder:7b"

[ai.acp]
cursor_acp_path = ""
cursor_acp_model_id = ""

[ai.mcp_only]

[ai.cloud]
active_provider = "anthropic"

[ai.cloud.anthropic]
model = "claude-sonnet-4-20250514"

[ai.cloud.openai]
base_url = "https://api.openai.com"
model = "gpt-4o"

[ai.cloud.deepseek]
base_url = "https://api.deepseek.com"
model = "deepseek-chat"

[ai.chat]
settings_presentation = "mfd"
show_thinking_in_history = true

[mcp]
external_servers_json = "[]"
acp_auto_inject_ide_mcp = true

[agent_notes]
# SSOT с Cursor MCP: тот же TOML, что в mcp.json → --config для agent-notes-mcp.
config_path = "D:/agent-notes-mcp/agent-notes-mcp.toml"
# Необязательно: каталог канона с подпапкой knowledge/ поверх встроенного KB-Base IDE.
kb_base_overlay_path = ""

[workspace]
pfd_expanded = true
show_terminal = true
show_git = true
show_instrumentation = true
mode = "Flight"
culture = ""
splitters_locked = false

[code_navigation_map]
view = "list"

[languages.csharp]
mode = "ParseOnly"

[languages.csharp.parse_only]
executable = ""
arguments = ""

[languages.markdown]
mode = "Marksman"

[languages.markdown.marksman]
executable = ""
arguments = ""

[markdown.diagrams]
kroki = true
kroki_url = "https://kroki.io"

[display.screens]
topology = "(0.55P+0.45F)(M)"

[display.screens.grammar]
brackets = "()"
between_screens = " "
between_zones = "+"
pfd = "P"
forward = "F"
mfd = "M"

[display]
maximize_hosts_on_dedicated_screens = true
prefer_repo_instruments = false

[display.mfd]
open_on_startup = true
pixel_x = 1920
pixel_y = 0
width = 1280.0
height = 649.3333333333334

[display.skia]
zone_geometry_overlay = false
instrument_mount = false

[display.mount]
default_style = "instrument_mount_v1"
enforce_eligibility = false
min_sa = 0.6
min_performance = 0.6
max_workload = 0.5
require_scores = false

[code_navigation]

[editor.inline_hints]
enabled = true
parameter_names = true
variable_types = true

[editor.debug_hints]
enabled = true
show_assignments = true
show_conditions = true
