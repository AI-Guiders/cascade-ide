# Пример пользовательского settings.toml (ADR 0028: %LocalAppData%\CascadeIDE\settings.toml).
# Ключи — snake_case (CascadeTomlSerializer / Tomlyn). Секции — логические группы.
# Раскладка дисплеев и Mfd-host — секция [display].

[display]
# Раскладка по дисплеям (ADR 0017). Пробелы внутри (…) допустимы — парсер их убирает.
presentation = "(0.25P + 0.75F) (M)"
# W2: debug-preview контуров зон поверх MainGrid (только визуализация геометрии, без замены контента).
use_skia_zone_geometry_preview = false
# W3: лёгкий preview instrument-content (attitude stub) в зоне PFD.
use_skia_instrument_wave3_preview = false

[ai]
default_ollama_model = "qwen2.5-coder:7b"
provider = "Ollama"
anthropic_model = "claude-sonnet-4-20250514"
open_ai_base_url = "https://api.openai.com"
open_ai_model = "gpt-4o"
deep_seek_base_url = "https://api.deepseek.com"
deep_seek_model = "deepseek-chat"
cursor_acp_path = ""
# mfd — страница параметров AI во вторичном контуре; window — отдельное окно настроек (ADR 0021 / 0028).
ai_chat_settings_presentation = "mfd"
# Не вызывать встроенный LLM после отправки; ответы — через MCP (send_chat role=assistant).
chat_mcp_only = false

[mcp]
# Cursor ACP: подмешивать stdio MCP IDE (cascade-ide) в session/new без дублирования в external_servers_json (ADR 0048 §7).
acp_auto_inject_ide_mcp = true
external_servers_json = "[]"

[workspace_ui]
show_solution_explorer = true
show_terminal = true
show_git = false
show_instrumentation = true
mode = "Flight"
culture = ""

[csharp_lsp]
# ParseOnly | OmniSharp | CSharpLs | Custom
provider = "OmniSharp"
executable = ""
arguments = ""

[markdown_lsp]
# Off | Marksman | Custom
provider = "Marksman"
executable = ""
arguments = ""

[markdown_diagrams]
kroki_enabled = true
kroki_base_url = "https://kroki.io"

[presentation_grammar]
pfd_zone_identifier = "P"
forward_zone_identifier = "F"
mfd_zone_identifier = "M"

# Пресеты навигации: бандл в WorkspaceNavigation/presets.toml (и embedded); опционально команда — .cascade/workspace.toml; здесь — личный overlay ([[workspace_navigation_context.presets]], merge по id поверх бандла и репо).
# [[workspace_navigation_context.presets]]
# id = "my_preset"
# exclude_kinds = ["same_namespace"]
