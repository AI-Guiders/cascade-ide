# Пример пользовательского settings.toml (ADR 0028: %LocalAppData%\CascadeIDE\settings.toml).
# Ключи — snake_case (CascadeTomlSerializer / Tomlyn). Секции — вложенные таблицы.

# Строка топологии и грамматика якорей (ADR 0017).
[presentation]
line = "(0.25P + 0.75F) (M)"
line_alias = ""

[presentation.grammar]
brackets = "()"
between_screens = " "
between_zones = "+"
pfd = "P"
forward = "F"
mfd = "M"

[display]
maximize_hosts_on_dedicated_screens = true
prefer_repo_instruments = false

[display.pfd]
open_on_startup = true

[display.mfd]
open_on_startup = true

[display.skia]
zone_geometry_overlay = false
instrument_mount = false

[display.mount]
default_style = "instrument_mount_v1"
enforce_eligibility = false
min_sa = 0.6
min_performance = 0.6
max_workload = 0.5
require_scores = false

[[display.mount.rules]]
surface = "main_window_docked_grid"
slot = "pfd"
instrument = "workspace_health_status_v1"
style = "instrument_mount_v1"
sa_score = 0.8
performance_score = 0.8
workload_score = 0.2

[[display.mount.rules]]
surface = "main_window_plus_mfd_host_top_level"
slot = "mfd"
instrument = "workspace_health_status_v1"
style = "instrument_mount_v1"
sa_score = 0.75
performance_score = 0.72
workload_score = 0.28

# Основные слоты PFD/MFD (ADR 0050): alias или канонический instrument_id.
[display.instruments]
pfd_primary = "workspace_map"

[ai]
default_ollama_model = "qwen2.5-coder:7b"
provider = "Ollama"
anthropic_model = "claude-sonnet-4-20250514"
open_ai_base_url = "https://api.openai.com"
open_ai_model = "gpt-4o"
deep_seek_base_url = "https://api.deepseek.com"
deep_seek_model = "deepseek-chat"
cursor_acp_path = ""
ai_chat_settings_presentation = "mfd"
chat_mcp_only = false

[mcp]
acp_auto_inject_ide_mcp = true
external_servers_json = "[]"
external_servers_json_path = ""

[workspace]
pfd_expanded = true
show_terminal = true
show_git = false
show_instrumentation = true
mode = "Flight"
culture = ""
splitters_locked = false

[semantic_map]
view = "list"
depth = "file"

[languages.csharp]
provider = "OmniSharp"
executable = ""
arguments = ""

[languages.markdown]
provider = "Marksman"
executable = ""
arguments = ""

[markdown.diagrams]
kroki = true
kroki_url = "https://kroki.io"

[workspace_navigation]
# Пресеты: бандл WorkspaceNavigation/presets.toml + .cascade/workspace.toml + этот файл ([[workspace_navigation.presets]]).
# [[workspace_navigation.presets]]
# id = "my_preset"
# exclude_kinds = ["same_namespace"]
