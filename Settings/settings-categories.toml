# Опциональный overlay для окна «Настройки».
# По умолчанию список строится автоматически из [SettingsPanel] на *SettingsPanelView в сборке.
# Темы IDE — JSON в Themes/*.json (сканируется на странице «Тема IDE»).
#
# Этот файл нужен только чтобы:
# - переупорядочить пункты (order),
# - переименовать group/title,
# - скрыть пункт (hidden = true),
# - добавить пункт без своей панели в коде (редко).
#
# Если удалить все [[settings_category]] — останутся только атрибуты на панелях.

# Пример переупорядочивания (раскомментируй при необходимости):
# [[settings_category]]
# panel = "ai_chat"
# order = 5
