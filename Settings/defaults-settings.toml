# CascadeIDE — заводские дефолты (шипнутый слой, ADR 0028).
# EmbeddedResource + Settings/defaults-settings.toml рядом с exe.
# Merge: %LocalAppData%\CascadeIDE\settings.toml поверх этого файла.
#
# Соглашение:
# - Пути/URL с каноном — явное значение (относительно CascadeIDE.exe, workspace или LocalAppData — см. комментарий).
# - Пустая строка только там, где «выключено / поиск в PATH / выбор позже» — всегда с комментарием.
# Расширенный пример: docs/samples/settings.toml

[display.screens]
topology = "(0.25P + 0.75F) (M)"

[display.screens.grammar]
brackets = "()"
between_screens = " "
between_zones = "+"
pfd = "P"
forward = "F"
mfd = "M"

[display]
maximize_hosts_on_dedicated_screens = true
prefer_repo_instruments = false

[display.pfd]
open_on_startup = true

[display.mfd]
open_on_startup = true

[display.skia]
zone_geometry_overlay = false
instrument_mount = false

[display.mount]
default_style = "instrument_mount_v1"
enforce_eligibility = false
min_sa = 0.6
min_performance = 0.6
max_workload = 0.5
require_scores = false

[[display.mount.rules]]
surface = "main_window_docked_grid"
slot = "pfd"
instrument = "ide_health_status_v1"
style = "instrument_mount_v1"
sa_score = 0.8
performance_score = 0.8
workload_score = 0.2

[[display.mount.rules]]
surface = "main_window_plus_mfd_host_top_level"
slot = "mfd"
instrument = "ide_health_status_v1"
style = "instrument_mount_v1"
sa_score = 0.75
performance_score = 0.72
workload_score = 0.28

[display.instruments]
pfd_primary = "workspace_map"
pfd_status_strip = "background_status"
forward_status_strip = "background_status"

[ai]
# local | acp | mcp_only | cloud
mode = "local"

[ai.local]
backend = "ollama"

[ai.local.ollama]
model = "qwen2.5-coder:7b"

[ai.acp]
cursor_acp_path = ""
# PATH = поиск cursor-agent в PATH; иначе имя переменной с путём (ADR 0149)
cursor_acp_path_env = "PATH"
# Пусто = модель из session/new или дефолт ACP
cursor_acp_model_id = ""

[ai.mcp_only]

[ai.cloud]
active_provider = "anthropic"

[ai.cloud.anthropic]
model = "claude-sonnet-4-20250514"

[ai.cloud.openai]
base_url = "https://api.openai.com"
model = "gpt-4o"

[ai.cloud.deepseek]
base_url = "https://api.deepseek.com"
model = "deepseek-chat"

[ai.chat]
# mfd | window
settings_presentation = "mfd"
show_thinking_in_history = true

[mcp]
acp_auto_inject_ide_mcp = true
external_servers_json = "[]"
# Пусто = только inline JSON выше; иначе путь относительно %LocalAppData%\CascadeIDE\
external_servers_json_path = ""

[hybrid_index]
enabled = true
# Относительно корня workspace
index_dir = ".hybrid-codebase-index"
debounce_ms = 750
auto_reindex_on_solution_open = true
watch_files = true
scope_mode = "workspace+solution"
pause_when_mcp_stdio_host = false

[solution_warmup]
enabled = true
warm_active_file_on_solution_open = true
warm_feed_anchors_after_symbol_sidecar = true
warm_open_documents = true
warm_recent_cs_files = true
max_parallel_file_jobs = 2
max_open_document_files = 6
show_background_status_on_pfd = true

[command_palette.go_to_search]
backend = "rg"

[agent.environment]
default_verify_policy = "standard"
default_sandbox_profile = "agent_ephemeral"
runner_max_concurrency = 2
coalesce_window_ms = 1500
# deny | l3_only | allow_with_audit
shell_escape_tier = "deny"

# agent_worktree | agent_ephemeral | in_place — для batch/long autonomous verify (W6)
long_run_sandbox_profile = "agent_worktree"
# supervised-inproc | supervised-worker-process | supervised-worker-daemon (opt-in long-lived IPC)
build_verify_host = "supervised-inproc"
# Пусто = авто (рядом с CascadeIDE.exe или tools/ в dev)
# build_verify_worker_assembly_path = ""

[agent.environment.dev_services]
require_config_override = true
gate_l3_on_violation = true

[agent.environment.ladder]
l0_enabled = true
l4_require_explicit = true
l3_touched_tests_only = true
# open_tabs — только вкладки; open_tabs_and_git_dirty_cs — + .cs из git diff / --cached в workspace (парсер L0).
l0_cs_scope = "open_tabs_and_git_dirty_cs"
l0_git_dirty_max_files = 48
# + .cs из solution warm-up (открытые/активный), с диска если не во вкладке
l0_include_warmup_cs = true
# 0 = как solution_warmup.max_open_document_files
l0_warmup_max_files = 0

[agent.environment.time_accounting]
show_in_chat = true
pfd_instrument_enabled = true
show_task_progress_in_chat = true
# 0 = idle_user выкл
idle_user_threshold_ms = 0

[agent_notes]
# Пусто = встроенный agent-notes; иначе путь относительно %LocalAppData%\CascadeIDE\
config_path = ""
config_path_env = ""
# Пусто = без overlay; иначе каталог с knowledge/ поверх KB-Base
kb_base_overlay_path = ""
kb_base_overlay_path_env = ""

[workspace]
pfd_expanded = true
show_terminal = true
show_git = false
show_instrumentation = true
mode = "Flight"
# Пусто = язык UI из ОС / thread culture
culture = ""
splitters_locked = false
# editor | intercom
primary_work_surface = "editor"

[code_navigation_map]
# list | graph | both
view = "graph"
# file | controlFlow
depth = "file"
# glance | normal | inspect
detail_level = "normal"
# radial | top_down | bottom_up — укладка related-files на PFD (не solution explorer)
related_graph_layout = "top_down"
# auto | vertical | horizontal — главная ось потока на мини-карте control-flow
control_flow_main_axis = "auto"

[languages.csharp]
# ParseOnly | OmniSharp | CSharpLs | Custom
mode = "OmniSharp"

[languages.csharp.parse_only]
executable = ""
arguments = ""

[languages.csharp.omni_sharp]
executable = ""
# PATH = явно искать OmniSharp в PATH (ADR 0149); иначе имя переменной с абсолютным путём
executable_env = "PATH"
arguments = ""
arguments_env = ""

[languages.csharp.csharp_ls]
executable = ""
executable_env = "PATH"
arguments = ""
arguments_env = ""

[languages.csharp.custom]
executable = ""
arguments = ""

[languages.markdown]
# Off | Marksman | Custom
mode = "Marksman"

[languages.markdown.off]
executable = ""
arguments = ""

[languages.markdown.marksman]
executable = ""
executable_env = "PATH"
arguments = ""
arguments_env = ""

[languages.markdown.custom]
executable = ""
arguments = ""

[markdown.diagrams]
kroki = true
kroki_url = "https://kroki.io"

[fonts.intercom]
prose_pt = 13
prose_pt_forward = 12
composer_pt = 15
command_line_pt = 15
chrome_title_pt = 14
chrome_subtitle_pt = 11
chrome_heading_pt = 15
card_title_pt = 15
panel_title_pt = 16
panel_subtitle_pt = 12
panel_label_pt = 13
panel_input_pt = 15
panel_body_pt = 16
prose_family = "Segoe UI"
mono_family = "Cascadia Mono,Consolas"
chip_family = "Segoe UI"
chip_id_family = "Consolas"
slash_meta_family = "Consolas"
slash_args_family = "Consolas"
role_family = "Segoe UI"
gutter_family = "Cascadia Mono,Consolas"

[fonts.editor]
size_pt = 14
family = "Consolas,Cascadia Code,monospace"

[editor.inline_hints]
enabled = true
parameter_names = true
variable_types = true

[editor.debug_hints]
enabled = true
show_assignments = true
show_conditions = true

[intercom]
# comfortable | compact
feed_metrics = "compact"
# left | right | highlight_only
tci_validation_icon = "right"

[intercom.attachments.code]
# reveal | select
navigate = "reveal"
# when_needed | never
reveal_load_solution = "when_needed"

[intercom.transport]
enabled = false
base_url = "http://127.0.0.1:5080"
base_url_env = ""
local_server_path = "tools/intercom-service/IntercomService.exe"
local_server_path_env = ""
# Пусто = после Connect / resolve workspace (не путь к файлу)
team_id = ""
# Пусто = topic general на сервере
default_topic_id = ""
oauth_provider = "github"
# DEV: Bearer для curl/локальных тестов; пусто = только OAuth
dev_team_token = ""
sse_reconnect_backoff_ms = 1000
auto_connect_on_send = true
sync_agent_channel_messages = true

[logging.intercom]
send_trace = false
