# Глобальные метрики хрома и превью Markdown (schema_version — в index.toml [bundle]).
[chrome]
pfd_region_default_width_pixels = 220
main_grid_column_splitter_width_pixels = 4
bottom_panel_min_row_pixels = 80
mfd_region_collapsed_width_pixels = 0
mfd_region_expanded_default_width_pixels = 340
mfd_region_expanded_power_width_pixels = 420
mfd_region_expanded_agent_chat_width_pixels = 520
# mfd | separate_window (или window)
markdown_preview_placement = "mfd"

# Ось размера файла для бейджа LOC (непустые строки; не путать с EICAS W/C/A).
# Low: loc < medium_min; Medium: medium_min <= loc < high_min; High: loc >= high_min.
[loc_limits]
medium_min = 300
high_min = 800

# ADR 0021/0051 + ADR 0050: одна таблица [routing] — иначе Tomlyn при двух [routing.*] перезаписывает вложенный объект.
# Канонические intent-id: forward, pfd, mfd, eicas, hud; слоты — alias без сырых instrument_id.
# По умолчанию: карта намерений в PFD; дерево решения — в слоте MFD (иначе mfd_primary не резолвится из workspace-карты).
[routing]
attention = { solution_explorer = "pfd", chat = "mfd", git = "mfd", terminal = "mfd", editor = "forward" }
instruments = { pfd_primary = "workspace_map", mfd_primary = "solution_explorer" }
