# Единственный продуктовый UI-режим: полигон раскладки (PFD/MFD, мультиоконность).
# Гипотезы — отдельная страница вторичного контура (MFD), не отдельный «режим Debug».
family = "Flight"

solution_explorer_visible = true
build_output_visible = true
terminal_visible = true
chat_panel_expanded = true
editor_group_count = 2
theme_slot = "CursorLike"
select_terminal_tab_when_terminal_shown = false

active_task_strip = true

quick_actions = true
agent_operations_panel = true
agent_trace = false
autonomous_agent_telemetry = false
workspace_health_on_terminal_tab = false
workspace_health_main_column_span = 5
instrumentation_tabs = true
hypotheses_tab = true
risk_summary_card = true
result_summary_card = true

# Удобно отлаживать раскладку: Workspace Health отдельной страницей в MFD.
workspace_health_surface = "dedicated_page"

# Верхняя панель с кнопками не нужна — палитра команд (Quick Command) покрывает сценарии.
main_toolbar = false

main_window_title = "CascadeIDE — Flight (layout lab)"
